<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>
<style>
body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #314d81, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(22, 28, 66, 0.6);
            padding: 60px;
            border-radius: 12px;
            width: 60%;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        button {
            margin-top: 30px;
            padding: 12px 35px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f1c40f;
            font-weight: bold;
        }

        button:hover {
            background-color: #f39c12;
        }
    </style>
</head>

<body>

<div class="container">
        <h1>Welcome To</h1>
        <h2>TEXT TO AUDIO GENERATOR</h2>

        <p>
            An Offline Web-Based Text to Speech System 
            that converts text into audible speech with
            speed control,and audio playback features.
        </p>

<a href="/login">
<button>Login</button>
</a>

</div>

</body>
</html>
