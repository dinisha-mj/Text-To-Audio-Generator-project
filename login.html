<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    font-size:36px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    font-size:20px;
    border-radius:6px;
    border:1px solid #ccc;
}

input::placeholder{
    font-size:20px;
}

button{
    width:100%;
    padding:14px;
    font-size:20px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#4a5bdc;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Log In</h2>

<form action="/login" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Log In</button>

</form>

</div>

</body>
</html>
